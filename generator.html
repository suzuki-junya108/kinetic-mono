<!DOCTYPE html>
<html lang="en" data-accent="single">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KINETIC MONO — Generator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <style>
    .gen-body { padding: var(--sp-5); }

    /* Preview */
    .gen-preview {
      background: var(--surface-0);
      padding: var(--sp-4);
      box-shadow: var(--shadow-card);
      margin-bottom: var(--sp-3);
    }
    .gen-preview__label {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: var(--sp-2);
    }
    .gen-preview__size {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-3);
    }
    .gen-canvas-wrap {
      background: var(--surface-3);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }
    .gen-canvas-wrap canvas {
      display: block;
      max-width: 100%;
      max-height: 520px;
      object-fit: contain;
    }

    /* Controls */
    .gen-controls {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: var(--sp-3);
      margin-bottom: var(--sp-3);
    }
    .gen-panel {
      background: var(--surface-0);
      padding: var(--sp-3);
      box-shadow: var(--shadow-card);
    }
    .gen-panel__title {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.2em;
      color: var(--text-4);
      margin-bottom: var(--sp-2);
      text-transform: uppercase;
    }

    /* Format select */
    .gen-format-list {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .gen-format-btn {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      background: var(--surface-2);
      color: var(--text-2);
      text-transform: uppercase;
      border-left: 2px solid transparent;
      transition: background var(--dur-instant) var(--ease-kinetic),
                  border-color var(--dur-instant) var(--ease-kinetic),
                  transform var(--dur-instant) var(--ease-kinetic);
    }
    .gen-format-btn:hover {
      background: var(--surface-3);
      transform: translateX(2px);
    }
    .gen-format-btn--active {
      background: var(--surface-0);
      border-left-color: var(--a1);
      color: var(--text-1);
    }
    .gen-format-btn__size {
      font-family: var(--font-mono);
      font-size: 9px;
      color: var(--text-4);
    }

    /* Theme buttons */
    .gen-theme-btns {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .gen-theme-btn {
      display: flex;
      align-items: center;
      gap: var(--sp-1);
      padding: 8px 12px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      background: var(--surface-2);
      color: var(--text-2);
      text-transform: uppercase;
      border-left: 2px solid transparent;
      transition: background var(--dur-instant) var(--ease-kinetic),
                  border-color var(--dur-instant) var(--ease-kinetic),
                  transform var(--dur-instant) var(--ease-kinetic);
    }
    .gen-theme-btn:hover {
      background: var(--surface-3);
      transform: translateX(2px);
    }
    .gen-theme-btn--active {
      background: var(--surface-0);
      border-left-color: var(--a1);
      color: var(--text-1);
    }
    .gen-theme-swatch {
      width: 16px;
      height: 16px;
      border: 1px solid var(--surface-4);
    }

    /* Accent mode buttons */
    .gen-accent-btns {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .gen-accent-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 12px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      background: var(--surface-2);
      color: var(--text-2);
      text-transform: uppercase;
      border-left: 2px solid transparent;
      transition: background var(--dur-instant) var(--ease-kinetic),
                  border-color var(--dur-instant) var(--ease-kinetic),
                  transform var(--dur-instant) var(--ease-kinetic);
    }
    .gen-accent-btn:hover {
      background: var(--surface-3);
      transform: translateX(2px);
    }
    .gen-accent-btn--active {
      background: var(--surface-0);
      border-left-color: var(--a1);
      color: var(--text-1);
    }
    .gen-accent-btn .km-swatch {
      width: 8px;
      height: 8px;
    }
    .gen-accent-dots {
      display: flex;
      gap: 2px;
    }

    /* Custom colors */
    .gen-custom-panel {
      display: none;
      margin-top: var(--sp-2);
      padding: var(--sp-2);
      background: var(--surface-2);
    }
    .gen-custom-panel--visible { display: block; }
    .gen-custom-row {
      display: flex;
      align-items: center;
      gap: var(--sp-1);
      margin-bottom: 6px;
    }
    .gen-custom-row:last-child { margin-bottom: 0; }
    .gen-custom-label {
      font-family: var(--font-mono);
      font-size: 9px;
      font-weight: 700;
      color: var(--text-3);
      min-width: 24px;
    }
    .gen-color-input {
      width: 28px;
      height: 28px;
      padding: 0;
      border: 1px solid var(--surface-4);
      background: none;
      cursor: pointer;
    }
    .gen-color-input::-webkit-color-swatch-wrapper { padding: 0; }
    .gen-color-input::-webkit-color-swatch { border: none; }
    .gen-color-hex {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-3);
      min-width: 60px;
    }
    .gen-color-count {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: var(--sp-1);
    }
    .gen-color-count__label {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.1em;
      color: var(--text-3);
      text-transform: uppercase;
    }
    .gen-color-count__btns {
      display: flex;
      gap: 2px;
    }
    .gen-count-btn {
      width: 24px;
      height: 24px;
      font-size: 10px;
      font-weight: 700;
      background: var(--surface-3);
      color: var(--text-2);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background var(--dur-instant);
    }
    .gen-count-btn:hover { background: var(--surface-4); }
    .gen-count-btn--active {
      background: var(--palette-black);
      color: var(--palette-white);
    }

    /* Action buttons */
    .gen-actions {
      display: flex;
      gap: var(--sp-2);
    }
    .gen-actions .km-btn { flex: 1; justify-content: center; }

    @media (max-width: 1100px) {
      .gen-controls { grid-template-columns: 1fr 1fr; }
    }
    @media (max-width: 900px) {
      .gen-controls { grid-template-columns: 1fr; }
      .gen-body { padding: var(--sp-3); }
    }
    @media (max-width: 480px) {
      .gen-body { padding: var(--sp-2); }
      .gen-actions { flex-direction: column; }
    }
  </style>
</head>

  <script>
  (function() {
    'use strict';

    /* ── State ── */
    var state = {
      width: 1500,
      height: 500,
      formatName: 'x-header',
      theme: 'dark',
      accentMode: 'single',
      seed: Math.floor(Math.random() * 100000),
      customCount: 1,
      customColors: ['#FFEA00', '#0057FF', '#FF2D2D', '#00C853', '#8B00FF', '#FF6B00']
    };

    var canvas = document.getElementById('gen-canvas');
    var ctx = canvas.getContext('2d');

    var PRESETS = {
      single: ['#FFEA00'],
      dual:   ['#FFEA00', '#0057FF'],
      tri:    ['#FFEA00', '#0057FF', '#FF2D2D'],
      full:   ['#FFEA00', '#0057FF', '#FF2D2D', '#00C853', '#8B00FF', '#FF6B00']
    };

    var THEMES = {
      dark:   { bg: '#0A0A0A', fg: '#FFFFFF', surfaces: ['#1A1A1A', '#2A2A2A', '#3A3A3A'] },
      light:  { bg: '#F9F9F9', fg: '#000000', surfaces: ['#FFFFFF', '#F3F3F3', '#EBEBEB'] },
      accent: { bg: null, fg: '#000000', surfaces: ['#FFFFFF', '#F3F3F3', '#000000'] }
    };

    function mulberry32(a) {
      return function() {
        a |= 0; a = a + 0x6D2B79F5 | 0;
        var t = Math.imul(a ^ a >>> 15, 1 | a);
        t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
        return ((t ^ t >>> 14) >>> 0) / 4294967296;
      };
    }

    function getAccentColors() {
      if (state.accentMode === 'custom') {
        var c = [];
        for (var i = 0; i < state.customCount; i++) c.push(state.customColors[i]);
        return c;
      }
      return PRESETS[state.accentMode] || PRESETS.single;
    }

    function snap(v) { return Math.round(v / 8) * 8; }

    function getBgColor() {
      if (state.theme === 'accent') return getAccentColors()[0];
      return THEMES[state.theme].bg;
    }

    function onColor(hex) {
      var r = parseInt(hex.slice(1, 3), 16);
      var g = parseInt(hex.slice(3, 5), 16);
      var b = parseInt(hex.slice(5, 7), 16);
      return (0.299 * r + 0.587 * g + 0.114 * b) / 255 > 0.5 ? '#000000' : '#FFFFFF';
    }

    function pick(rand, arr) { return arr[Math.floor(rand() * arr.length)]; }

    /* ════════════════════════════════════════════════
       COMPOSITION STYLES
       ════════════════════════════════════════════════ */

    /* ── 1. TYPE FIELD — Giant typography as compositional architecture ── */
    function drawTypeField(w, h, rand, accents, bg, fg, surfaces) {
      var FONT = "'Plus Jakarta Sans', sans-serif";
      var MONO = "'JetBrains Mono', monospace";
      var scale = Math.min(w, h) / 500;

      // Giant background character — cropped, bleeding off edges
      var chars = ['K', 'M', '0', '1', '/', '—', '√', '∞', 'Σ', '▪'];
      var mainChar = chars[Math.floor(rand() * chars.length)];
      var fontSize = snap(h * (1.2 + rand() * 0.8));
      ctx.font = '800 ' + fontSize + 'px ' + FONT;
      ctx.fillStyle = fg;
      ctx.globalAlpha = 0.04 + rand() * 0.04;
      var cx = snap(w * (-0.1 + rand() * 0.5));
      var cy = snap(h * (0.5 + rand() * 0.6));
      ctx.fillText(mainChar, cx, cy);
      ctx.globalAlpha = 1;

      // Accent color field — large asymmetric block
      var mainAccent = accents[0];
      var fieldW = snap(w * (0.25 + rand() * 0.35));
      var fieldH = snap(h * (0.4 + rand() * 0.5));
      var fieldX = snap(w * (0.5 + rand() * 0.3));
      var fieldY = snap(h * (0.05 + rand() * 0.3));
      ctx.fillStyle = mainAccent;
      ctx.fillRect(fieldX, fieldY, fieldW, fieldH);

      // Medium display number inside the accent field
      var displayNum = String(Math.floor(rand() * 100)).padStart(2, '0');
      var numSize = snap(fieldH * (0.5 + rand() * 0.3));
      ctx.font = '800 ' + numSize + 'px ' + FONT;
      ctx.fillStyle = onColor(mainAccent);
      ctx.globalAlpha = 0.2 + rand() * 0.15;
      ctx.fillText(displayNum, fieldX + snap(fieldW * 0.08), fieldY + numSize * 0.85);
      ctx.globalAlpha = 1;

      // Micro-label rows — the system's signature element
      var labels = [
        'KINETIC MONO', 'THE CLINICAL CURATOR', 'BRUTALISM × LUXURY',
        '√2 RATIO', 'ZERO RADIUS', '8PX GRID', 'PLUS JAKARTA SANS',
        'SURFACE SHIFT', 'KINETIC HOVER', 'ACCENT MODE'
      ];
      var labelY = snap(h * (0.08 + rand() * 0.15));
      var labelX = snap(w * 0.04);
      var labelSize = Math.max(9, snap(10 * scale));
      ctx.font = '700 ' + labelSize + 'px ' + FONT;
      var numLabels = Math.floor(3 + rand() * 4);
      for (var i = 0; i < numLabels; i++) {
        var label = labels[Math.floor(rand() * labels.length)];
        ctx.fillStyle = fg;
        ctx.globalAlpha = 0.25 + rand() * 0.2;
        ctx.letterSpacing = '0.2em';
        ctx.fillText(label, labelX, labelY + i * snap(labelSize * 2.5));
      }
      ctx.globalAlpha = 1;

      // Vertical kinetic line — 4px signature
      var lineX = snap(w * (0.3 + rand() * 0.15));
      ctx.fillStyle = pick(rand, accents);
      ctx.fillRect(lineX, 0, 4, h);

      // Secondary accent block — contrasting
      if (accents.length > 1) {
        var secW = snap(w * (0.08 + rand() * 0.12));
        var secH = snap(h * (0.5 + rand() * 0.4));
        var secX = snap(w * (0.02 + rand() * 0.2));
        var secY = snap(h * (0.3 + rand() * 0.4));
        ctx.fillStyle = accents[1 % accents.length];
        ctx.fillRect(secX, secY, secW, secH);
      }

      // Monospace data strings — JetBrains Mono textures
      var monoSize = Math.max(8, snap(9 * scale));
      ctx.font = '400 ' + monoSize + 'px ' + MONO;
      ctx.fillStyle = fg;
      ctx.globalAlpha = 0.12;
      var dataStrings = [];
      for (var i = 0; i < 8; i++) {
        var s = '';
        for (var j = 0; j < 20; j++) {
          s += rand() < 0.3 ? String.fromCharCode(48 + Math.floor(rand() * 10)) : ' ';
        }
        dataStrings.push(s);
      }
      var dataY = snap(h * (0.6 + rand() * 0.25));
      for (var i = 0; i < dataStrings.length; i++) {
        ctx.fillText(dataStrings[i], snap(w * 0.04), dataY + i * snap(monoSize * 1.8));
      }
      ctx.globalAlpha = 1;

      // Corner marker — small accent square with coordinates
      var markerSize = snap(32 * scale);
      ctx.fillStyle = pick(rand, accents);
      ctx.fillRect(w - markerSize - snap(16 * scale), snap(16 * scale), markerSize, markerSize);

      // Status dots row — bottom
      var dotY = snap(h - 24 * scale);
      for (var i = 0; i < 6; i++) {
        ctx.fillStyle = i < accents.length ? accents[i] : fg;
        ctx.globalAlpha = i < accents.length ? 1 : 0.1;
        ctx.fillRect(snap(w * 0.04 + i * 14 * scale), dotY, snap(6 * scale), snap(6 * scale));
      }
      ctx.globalAlpha = 1;
    }

    /* ── 2. KINETIC SHIFT — Motion trail echo effect ── */
    function drawKineticShift(w, h, rand, accents, bg, fg, surfaces) {
      var scale = Math.min(w, h) / 500;

      // Create primary forms — each gets motion echoes
      var numForms = Math.floor(3 + rand() * 3);
      var forms = [];
      for (var i = 0; i < numForms; i++) {
        forms.push({
          x: snap(rand() * w * 0.7),
          y: snap(rand() * h * 0.6 + h * 0.1),
          w: snap(w * (0.08 + rand() * 0.25)),
          h: snap(h * (0.15 + rand() * 0.4)),
          color: pick(rand, accents),
          dx: snap((8 + rand() * 16) * scale), // shift per echo
          dy: snap((rand() - 0.5) * 4 * scale),
          echoes: Math.floor(4 + rand() * 8)
        });
      }

      // Draw echoes back-to-front (farthest echo first)
      for (var f = 0; f < forms.length; f++) {
        var form = forms[f];
        for (var e = form.echoes; e >= 0; e--) {
          var ex = form.x - e * form.dx;
          var ey = form.y - e * form.dy;
          if (e === 0) {
            // Main form — full opacity
            ctx.fillStyle = form.color;
            ctx.fillRect(ex, ey, form.w, form.h);
          } else {
            // Echo — decreasing opacity
            ctx.fillStyle = form.color;
            ctx.globalAlpha = 0.03 + (1 - e / form.echoes) * 0.12;
            ctx.fillRect(ex, ey, form.w, form.h);
            ctx.globalAlpha = 1;
          }
        }
      }

      // Velocity lines — thin horizontal streaks suggesting speed
      var numStreaks = Math.floor(10 + rand() * 20);
      for (var i = 0; i < numStreaks; i++) {
        var sy = snap(rand() * h);
        var sx = snap(rand() * w * 0.3);
        var sl = snap(w * (0.1 + rand() * 0.5));
        var thickness = rand() < 0.3 ? 4 : 2;
        ctx.fillStyle = rand() < 0.4 ? pick(rand, accents) : fg;
        ctx.globalAlpha = 0.06 + rand() * 0.15;
        ctx.fillRect(sx, sy, sl, thickness);
      }
      ctx.globalAlpha = 1;

      // Motion indicator — arrow-like stepped blocks
      var arrowY = snap(h * (0.4 + rand() * 0.2));
      var arrowX = snap(w * 0.75);
      var stepSize = snap(12 * scale);
      for (var i = 0; i < 5; i++) {
        ctx.fillStyle = accents[0];
        ctx.globalAlpha = 0.3 + i * 0.15;
        ctx.fillRect(arrowX + i * stepSize * 1.5, arrowY - i * stepSize * 0.5,
                     stepSize, stepSize + i * stepSize);
      }
      ctx.globalAlpha = 1;

      // Foreground kinetic line — full-width horizontal
      var lineY = snap(h * (0.15 + rand() * 0.1));
      ctx.fillStyle = accents[0];
      ctx.fillRect(0, lineY, w, 4);

      // Bottom anchor line
      ctx.fillStyle = fg;
      ctx.globalAlpha = 0.06;
      ctx.fillRect(0, snap(h * 0.85), w, snap(2 * scale));
      ctx.globalAlpha = 1;

      // Dot trail — suggesting particle motion
      var trailY = snap(h * (0.7 + rand() * 0.15));
      var trailStartX = snap(w * 0.1);
      for (var i = 0; i < 12; i++) {
        var dotX = trailStartX + snap(i * w * 0.065);
        var dotAlpha = Math.min(1, 0.1 + i * 0.08);
        var dotSize = snap(Math.max(4, (4 + i * 0.5) * scale));
        ctx.fillStyle = accents[0];
        ctx.globalAlpha = dotAlpha;
        ctx.fillRect(dotX, trailY, dotSize, dotSize);
      }
      ctx.globalAlpha = 1;
    }

    /* ── 3. TOPOGRAPHY — Concentric inset rectangles as contour map ── */
    function drawTopography(w, h, rand, accents, bg, fg, surfaces) {
      var scale = Math.min(w, h) / 500;
      var lineW = Math.max(2, snap(2 * scale));

      // Generate contour centers
      var numCenters = Math.floor(2 + rand() * 3);
      var centers = [];
      for (var i = 0; i < numCenters; i++) {
        centers.push({
          x: snap(w * (0.15 + rand() * 0.7)),
          y: snap(h * (0.15 + rand() * 0.7)),
          maxRings: Math.floor(6 + rand() * 10),
          spacing: snap(Math.max(12, (16 + rand() * 24) * scale)),
          aspect: 0.5 + rand() * 1.0, // width/height ratio
          color: pick(rand, accents)
        });
      }

      // Draw contour rings for each center
      for (var c = 0; c < centers.length; c++) {
        var ctr = centers[c];
        for (var r = ctr.maxRings; r >= 0; r--) {
          var rw = r * ctr.spacing * 2;
          var rh = r * ctr.spacing * 2 * ctr.aspect;
          var rx = ctr.x - rw / 2;
          var ry = ctr.y - rh / 2;

          if (r === 0) {
            // Innermost — filled accent
            ctx.fillStyle = ctr.color;
            var innerSize = snap(ctr.spacing * 0.8);
            ctx.fillRect(ctr.x - innerSize / 2, ctr.y - innerSize / 2, innerSize, innerSize);
          } else {
            // Contour line — draw as rectangle outline
            var alpha = 0.08 + (1 - r / ctr.maxRings) * 0.3;
            ctx.strokeStyle = ctr.color;
            ctx.globalAlpha = alpha;
            ctx.lineWidth = lineW;
            ctx.strokeRect(rx, ry, rw, rh);
            ctx.globalAlpha = 1;
          }
        }
      }

      // Elevation markers — small squares at contour intersections
      var numMarkers = Math.floor(5 + rand() * 8);
      for (var i = 0; i < numMarkers; i++) {
        var mx = snap(rand() * w);
        var my = snap(rand() * h);
        var ms = snap(6 * scale);
        ctx.fillStyle = pick(rand, accents);
        ctx.fillRect(mx, my, ms, ms);
      }

      // Coordinate grid — very subtle cross-hairs
      var gridSpacing = snap(Math.max(40, w * 0.08));
      ctx.fillStyle = fg;
      ctx.globalAlpha = 0.03;
      for (var x = gridSpacing; x < w; x += gridSpacing) {
        ctx.fillRect(x, 0, 1, h);
      }
      for (var y = gridSpacing; y < h; y += gridSpacing) {
        ctx.fillRect(0, y, w, 1);
      }
      ctx.globalAlpha = 1;

      // Datum labels — small monospace coordinates
      var MONO = "'JetBrains Mono', monospace";
      var labelSize = Math.max(7, snap(8 * scale));
      ctx.font = '700 ' + labelSize + 'px ' + MONO;
      ctx.fillStyle = fg;
      ctx.globalAlpha = 0.15;
      for (var c = 0; c < centers.length; c++) {
        var ctr = centers[c];
        var coordStr = snap(ctr.x / 8) + ',' + snap(ctr.y / 8);
        ctx.fillText(coordStr, ctr.x + snap(8 * scale), ctr.y - snap(8 * scale));
      }
      ctx.globalAlpha = 1;

      // Edge accent — kinetic line at top
      ctx.fillStyle = accents[0];
      ctx.fillRect(0, 0, w, 4);

      // Scale bar — bottom right
      var barW = snap(w * 0.15);
      var barY = snap(h - 20 * scale);
      var barX = snap(w - barW - 24 * scale);
      ctx.fillStyle = fg;
      ctx.globalAlpha = 0.2;
      ctx.fillRect(barX, barY, barW, 2);
      ctx.fillRect(barX, barY - snap(4 * scale), 2, snap(8 * scale));
      ctx.fillRect(barX + barW, barY - snap(4 * scale), 2, snap(8 * scale));
      ctx.globalAlpha = 1;
    }

    /* ── 4. CIRCUIT — PCB-inspired paths and nodes ── */
    function drawCircuit(w, h, rand, accents, bg, fg, surfaces) {
      var scale = Math.min(w, h) / 500;
      var gridUnit = snap(Math.max(24, 32 * scale));
      var cols = Math.floor(w / gridUnit);
      var rows = Math.floor(h / gridUnit);
      var padX = snap((w - cols * gridUnit) / 2);
      var padY = snap((h - rows * gridUnit) / 2);

      // Generate nodes
      var nodes = [];
      var numNodes = Math.floor(6 + rand() * 8);
      for (var i = 0; i < numNodes; i++) {
        nodes.push({
          col: Math.floor(rand() * cols),
          row: Math.floor(rand() * rows),
          size: rand() < 0.3 ? 'large' : (rand() < 0.6 ? 'medium' : 'small'),
          color: pick(rand, accents)
        });
      }

      // Draw traces between connected nodes
      var traceW = Math.max(2, snap(3 * scale));
      for (var i = 0; i < nodes.length - 1; i++) {
        var a = nodes[i];
        var b = nodes[i + 1];
        var ax = padX + a.col * gridUnit + gridUnit / 2;
        var ay = padY + a.row * gridUnit + gridUnit / 2;
        var bx = padX + b.col * gridUnit + gridUnit / 2;
        var by = padY + b.row * gridUnit + gridUnit / 2;

        ctx.fillStyle = a.color;
        ctx.globalAlpha = 0.5 + rand() * 0.3;

        // L-shaped trace (horizontal first, then vertical)
        var turnX = rand() < 0.5 ? bx : ax;
        // Horizontal segment
        ctx.fillRect(Math.min(ax, turnX), ay, Math.abs(turnX - ax) + traceW, traceW);
        // Vertical segment
        ctx.fillRect(turnX, Math.min(ay, by), traceW, Math.abs(by - ay) + traceW);
        // Horizontal to B
        ctx.fillRect(Math.min(turnX, bx), by, Math.abs(bx - turnX) + traceW, traceW);

        // Turn point markers
        ctx.fillRect(turnX - traceW, ay - traceW, traceW * 3, traceW * 3);
      }
      ctx.globalAlpha = 1;

      // Parallel bus lines — groups of thin traces
      var numBuses = Math.floor(1 + rand() * 3);
      for (var b = 0; b < numBuses; b++) {
        var busCount = Math.floor(3 + rand() * 4);
        var busY = snap(rand() * h);
        var busColor = pick(rand, accents);
        for (var l = 0; l < busCount; l++) {
          ctx.fillStyle = busColor;
          ctx.globalAlpha = 0.15 + rand() * 0.2;
          ctx.fillRect(0, busY + l * snap(6 * scale), w, Math.max(1, snap(1 * scale)));
        }
      }
      ctx.globalAlpha = 1;

      // Draw nodes on top
      for (var i = 0; i < nodes.length; i++) {
        var n = nodes[i];
        var nx = padX + n.col * gridUnit + gridUnit / 2;
        var ny = padY + n.row * gridUnit + gridUnit / 2;

        if (n.size === 'large') {
          var s = snap(gridUnit * 0.7);
          // Outer ring (square)
          ctx.fillStyle = n.color;
          ctx.fillRect(nx - s / 2, ny - s / 2, s, s);
          // Inner cutout
          var inner = snap(s * 0.5);
          ctx.fillStyle = bg;
          ctx.fillRect(nx - inner / 2, ny - inner / 2, inner, inner);
          // Center dot
          var dot = snap(s * 0.2);
          ctx.fillStyle = n.color;
          ctx.fillRect(nx - dot / 2, ny - dot / 2, dot, dot);
        } else if (n.size === 'medium') {
          var s = snap(gridUnit * 0.45);
          ctx.fillStyle = n.color;
          ctx.fillRect(nx - s / 2, ny - s / 2, s, s);
        } else {
          var s = snap(6 * scale);
          ctx.fillStyle = n.color;
          ctx.fillRect(nx - s / 2, ny - s / 2, s, s);
        }
      }

      // Component labels
      var MONO = "'JetBrains Mono', monospace";
      var labelSize = Math.max(7, snap(8 * scale));
      ctx.font = '700 ' + labelSize + 'px ' + MONO;
      ctx.fillStyle = fg;
      ctx.globalAlpha = 0.18;
      for (var i = 0; i < nodes.length; i++) {
        var n = nodes[i];
        if (n.size !== 'small') {
          var nx = padX + n.col * gridUnit + gridUnit / 2;
          var ny = padY + n.row * gridUnit + gridUnit / 2;
          var id = 'KM-' + String(Math.floor(rand() * 9000 + 1000));
          ctx.fillText(id, nx + snap(gridUnit * 0.4), ny + snap(4 * scale));
        }
      }
      ctx.globalAlpha = 1;

      // Ground plane markers — hatched corners
      var cornerSize = snap(gridUnit * 2);
      ctx.fillStyle = fg;
      ctx.globalAlpha = 0.03;
      var hatchSpacing = snap(6 * scale);
      for (var x = 0; x < cornerSize; x += hatchSpacing) {
        ctx.fillRect(x, 0, 1, cornerSize - x);
        ctx.fillRect(w - cornerSize + x, h - cornerSize + x, 1, cornerSize - x);
      }
      ctx.globalAlpha = 1;
    }

    /* ── 5. DATA LANDSCAPE — Abstract dashboard as art ── */
    function drawDataLandscape(w, h, rand, accents, bg, fg, surfaces) {
      var scale = Math.min(w, h) / 500;
      var FONT = "'Plus Jakarta Sans', sans-serif";
      var MONO = "'JetBrains Mono', monospace";

      // Stat numbers — giant, semi-transparent
      var statValues = [];
      for (var i = 0; i < 3; i++) {
        statValues.push(String(Math.floor(rand() * 10000)));
      }
      var bigSize = snap(h * (0.6 + rand() * 0.4));
      ctx.font = '800 ' + bigSize + 'px ' + FONT;
      ctx.fillStyle = fg;
      ctx.globalAlpha = 0.04;
      for (var i = 0; i < statValues.length; i++) {
        ctx.fillText(statValues[i], snap(w * (0.02 + i * 0.35)), snap(h * (0.7 + rand() * 0.2)));
      }
      ctx.globalAlpha = 1;

      // Bar chart — abstract horizontal bars
      var numBars = Math.floor(5 + rand() * 8);
      var barH = snap(Math.max(8, h / (numBars * 2.5)));
      var barGap = snap(barH * 0.4);
      var barStartY = snap(h * (0.1 + rand() * 0.15));
      var barMaxW = w * (0.3 + rand() * 0.35);
      var barX = snap(w * (0.55 + rand() * 0.1));

      for (var i = 0; i < numBars; i++) {
        var by = barStartY + i * (barH + barGap);
        var bw = snap(barMaxW * (0.2 + rand() * 0.8));
        var colorIdx = i % accents.length;
        ctx.fillStyle = accents[colorIdx];
        ctx.globalAlpha = 0.6 + rand() * 0.4;
        ctx.fillRect(barX, by, bw, barH);

        // Value label
        var valSize = Math.max(8, snap(9 * scale));
        ctx.font = '700 ' + valSize + 'px ' + MONO;
        ctx.fillStyle = fg;
        ctx.globalAlpha = 0.3;
        ctx.fillText(String(Math.floor(rand() * 100)) + '%', barX + bw + snap(8 * scale), by + barH * 0.8);
      }
      ctx.globalAlpha = 1;

      // Progress ring substitute — concentric square rings (zero radius!)
      var ringX = snap(w * (0.08 + rand() * 0.15));
      var ringY = snap(h * (0.25 + rand() * 0.2));
      var ringMax = snap(Math.min(w * 0.25, h * 0.5));
      var rings = Math.floor(3 + rand() * 4);
      for (var i = rings; i >= 0; i--) {
        var rSize = snap(ringMax * ((i + 1) / (rings + 1)));
        var rx = ringX + (ringMax - rSize) / 2;
        var ry = ringY + (ringMax - rSize) / 2;
        if (i === 0) {
          ctx.fillStyle = pick(rand, accents);
          ctx.fillRect(rx, ry, rSize, rSize);
        } else {
          ctx.strokeStyle = pick(rand, accents);
          ctx.globalAlpha = 0.15 + (1 - i / rings) * 0.4;
          ctx.lineWidth = Math.max(2, snap(3 * scale));
          ctx.strokeRect(rx, ry, rSize, rSize);
        }
      }
      ctx.globalAlpha = 1;

      // Sparkline — zigzag path made of rectangles
      var sparkY = snap(h * (0.75 + rand() * 0.1));
      var sparkH = snap(h * 0.12);
      var sparkPoints = Math.floor(15 + rand() * 20);
      var sparkW = snap(w * 0.4);
      var sparkX = snap(w * (0.05 + rand() * 0.1));
      var prevY = sparkY;
      for (var i = 0; i < sparkPoints; i++) {
        var px = sparkX + snap(i * sparkW / sparkPoints);
        var nextPx = sparkX + snap((i + 1) * sparkW / sparkPoints);
        var py = snap(sparkY - rand() * sparkH);
        // Vertical connector
        ctx.fillStyle = accents[0];
        ctx.globalAlpha = 0.5;
        ctx.fillRect(px, Math.min(prevY, py), 2, Math.abs(py - prevY) + 2);
        // Horizontal segment
        ctx.fillRect(px, py, nextPx - px, 2);
        prevY = py;
      }
      ctx.globalAlpha = 1;

      // Micro-labels
      var labels = ['SYSTEM LOAD', 'THROUGHPUT', 'LATENCY', 'UPTIME', 'REQUESTS/S'];
      var labelSize = Math.max(8, snap(9 * scale));
      ctx.font = '700 ' + labelSize + 'px ' + FONT;
      ctx.fillStyle = fg;
      ctx.globalAlpha = 0.2;
      for (var i = 0; i < 3; i++) {
        var label = labels[Math.floor(rand() * labels.length)];
        ctx.fillText(label, snap(w * (0.04 + rand() * 0.3)), snap(h * 0.06 + i * labelSize * 3));
      }
      ctx.globalAlpha = 1;

      // Status indicator — 6x6 dot with label
      var statusY = snap(h - 24 * scale);
      ctx.fillStyle = accents[0];
      ctx.fillRect(snap(w * 0.04), statusY, snap(6 * scale), snap(6 * scale));
      ctx.font = '700 ' + Math.max(7, snap(8 * scale)) + 'px ' + MONO;
      ctx.fillStyle = fg;
      ctx.globalAlpha = 0.3;
      ctx.fillText('LIVE', snap(w * 0.04 + 12 * scale), statusY + snap(6 * scale));
      ctx.globalAlpha = 1;

      // Bottom accent line — 3px, signature stat card element
      ctx.fillStyle = accents[0];
      ctx.fillRect(0, h - snap(3 * scale), w, snap(3 * scale));
    }

    /* ── Draw — randomly combine layers ── */
    var ALL_LAYERS = [
      drawTypeField, drawKineticShift, drawTopography,
      drawCircuit, drawDataLandscape
    ];

    function draw() {
      var w = state.width;
      var h = state.height;
      canvas.width = w;
      canvas.height = h;

      var rand = mulberry32(state.seed);
      var accents = getAccentColors();
      var theme = THEMES[state.theme] || THEMES.dark;
      var bg = getBgColor();
      var fg = state.theme === 'accent' ? onColor(bg) : theme.fg;
      var surfaces = theme.surfaces.slice();

      ctx.fillStyle = bg;
      ctx.fillRect(0, 0, w, h);

      // Shuffle layers
      var pool = ALL_LAYERS.slice();
      for (var i = pool.length - 1; i > 0; i--) {
        var j = Math.floor(rand() * (i + 1));
        var tmp = pool[i]; pool[i] = pool[j]; pool[j] = tmp;
      }

      // Pick 2-3 layers to combine
      var count = 2 + (rand() < 0.4 ? 1 : 0);
      for (var i = 0; i < count; i++) {
        // Each subsequent layer is drawn with reduced opacity via a clipped save/restore
        if (i > 0) ctx.globalAlpha = 0.5 + rand() * 0.3;
        pool[i](w, h, mulberry32(state.seed + i * 7919), accents, bg, fg, surfaces);
        ctx.globalAlpha = 1;
      }

      document.getElementById('gen-size-label').textContent = w + ' x ' + h;
      document.getElementById('gen-seed-display').textContent = state.seed;
    }

    /* ── Format selection ── */
    document.getElementById('gen-format-list').addEventListener('click', function(e) {
      var btn = e.target.closest('.gen-format-btn');
      if (!btn) return;
      document.querySelectorAll('.gen-format-btn').forEach(function(b) {
        b.classList.remove('gen-format-btn--active');
      });
      btn.classList.add('gen-format-btn--active');
      state.width = parseInt(btn.dataset.w);
      state.height = parseInt(btn.dataset.h);
      state.formatName = btn.dataset.name;
      draw();
    });

    /* ── Theme selection ── */
    document.getElementById('gen-theme-btns').addEventListener('click', function(e) {
      var btn = e.target.closest('.gen-theme-btn');
      if (!btn) return;
      document.querySelectorAll('.gen-theme-btn').forEach(function(b) {
        b.classList.remove('gen-theme-btn--active');
      });
      btn.classList.add('gen-theme-btn--active');
      state.theme = btn.dataset.theme;
      draw();
    });

    /* ── Accent mode selection ── */
    document.getElementById('gen-accent-btns').addEventListener('click', function(e) {
      var btn = e.target.closest('.gen-accent-btn');
      if (!btn) return;
      document.querySelectorAll('.gen-accent-btn').forEach(function(b) {
        b.classList.remove('gen-accent-btn--active');
      });
      btn.classList.add('gen-accent-btn--active');
      state.accentMode = btn.dataset.accent;

      // Show/hide custom panel
      var panel = document.getElementById('gen-custom-panel');
      if (state.accentMode === 'custom') {
        panel.classList.add('gen-custom-panel--visible');
      } else {
        panel.classList.remove('gen-custom-panel--visible');
        // Also apply to global accent
        if (window.KineticMono) window.KineticMono.setAccent(state.accentMode);
      }
      draw();
    });

    /* ── Custom color count ── */
    document.getElementById('gen-count-btns').addEventListener('click', function(e) {
      var btn = e.target.closest('.gen-count-btn');
      if (!btn) return;
      document.querySelectorAll('.gen-count-btn').forEach(function(b) {
        b.classList.remove('gen-count-btn--active');
      });
      btn.classList.add('gen-count-btn--active');
      state.customCount = parseInt(btn.dataset.count);

      // Show/hide color rows
      document.querySelectorAll('#gen-custom-colors .gen-custom-row').forEach(function(row) {
        var idx = parseInt(row.dataset.idx);
        row.style.display = idx < state.customCount ? 'flex' : 'none';
      });
      draw();
    });

    /* ── Custom color inputs ── */
    document.querySelectorAll('.gen-color-input').forEach(function(input) {
      input.addEventListener('input', function() {
        var row = input.closest('.gen-custom-row');
        var idx = parseInt(row.dataset.idx);
        state.customColors[idx] = input.value.toUpperCase();
        row.querySelector('.gen-color-hex').textContent = input.value.toUpperCase();
        draw();
      });
    });

    /* ── Regenerate ── */
    document.getElementById('gen-regenerate').addEventListener('click', function() {
      state.seed = Math.floor(Math.random() * 100000);
      draw();
    });

    /* ── Download ── */
    document.getElementById('gen-download').addEventListener('click', function() {
      canvas.toBlob(function(blob) {
        var url = URL.createObjectURL(blob);
        var a = document.createElement('a');
        a.href = url;
        a.download = 'kinetic-mono-' + state.formatName + '-' + Date.now() + '.png';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
      }, 'image/png');
    });

    /* ── Init ── */
    // Sync accent mode from nav
    setTimeout(function() {
      var mode = window.KineticMono ? window.KineticMono.getAccent() : 'single';
      state.accentMode = mode;
      document.querySelectorAll('.gen-accent-btn').forEach(function(btn) {
        btn.classList.toggle('gen-accent-btn--active', btn.dataset.accent === mode);
      });
      draw();
    }, 60);

  })();
  </script>
